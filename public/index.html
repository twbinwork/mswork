<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SEA Simulation</title>
  <!-- Local Leaflet for offline support -->
  <link rel="stylesheet" href="/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <h2>Palette</h2>
      <div id="palette">
        <div class="palette-item" draggable="true" data-type="fixedwing">✈️ Fixed-wing</div>
        <div class="palette-item" draggable="true" data-type="rotary">🚁 Rotary-wing</div>
        <div class="palette-item" draggable="true" data-type="land">🚗 Land Vehicle</div>
        <div class="palette-item" draggable="true" data-type="ship">🚢 Ship</div>
      </div>

      <div id="scenario-controls">
        <h3>Scenario</h3>
        <label>Random Generate: <input id="rand-count" type="number" value="100" min="1" step="1" /></label>
        <button id="rand-generate">Spawn Random</button>
        <hr />
        <div id="controls">
          <button id="play">Play</button>
          <button id="pause">Pause</button>
          <button id="stop">Stop</button>
          <button id="reset">Reset</button>
        </div>
      </div>

      <div id="props-panel">
        <h3>Entity Properties</h3>
        <div id="no-selection">Drop an entity to edit</div>
        <form id="props-form" style="display:none">
          <input type="hidden" id="entity-id" />
          <label>Type: <span id="prop-type"></span></label>
          <label>Velocity (m/s): <input id="prop-velocity" type="number" step="0.1" /></label>
          <label>Acceleration (m/s²): <input id="prop-accel" type="number" step="0.1" /></label>
          <label>Turn Radius (m): <input id="prop-turnRadius" type="number" step="1" /></label>
          <label>Turn Rate (deg/s): <input id="prop-turnRate" type="number" step="0.1" /></label>
          <label>Heading (deg): <input id="prop-heading" type="number" step="0.1" /></label>
          <div class="form-actions">
            <button id="update-props" type="button">Update</button>
            <button id="delete-entity" type="button">Delete</button>
          </div>
        </form>
      </div>
    </aside>

    <main id="main">
      <div id="map" tabindex="0"></div>
      <canvas id="overlay"></canvas>
    </main>
  </div>

  <script src="/leaflet/leaflet.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
